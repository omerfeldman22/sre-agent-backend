apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-agent-backend
  labels:
    app: sre-agent-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sre-agent-backend
  template:
    metadata:
      labels:
        app: sre-agent-backend
    spec:
      containers:
        - name: sre-agent-backend
          image: demoacrsre.azurecr.io/sre-agent-backend:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: ALLOWED_ORIGINS
              value: "https://omerfsre.azurewebsites.net"
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: sre-agent-secrets
                  key: appinsights-connection-string
                  optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
